<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>whyjose.dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #000000;
      --text:    #F5F5F7;
      --dim:     #6E6E73;
      --dimmer:  #3A3A3C;
      --accent:  #2060FD;
      --sys:     system-ui, 'Helvetica Neue', Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sys);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .stage {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      gap: 0;
    }

    /* ── Logo mark ── */
    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--dim);
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s ease forwards;
    }

    /* ── Status pill ── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 5px 14px 5px 10px;
      font-size: 12px;
      color: var(--dim);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s ease forwards;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dimmer);
      flex-shrink: 0;
    }

    /* ── Main headline ── */
    .headline {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.08;
      color: var(--text);
      max-width: 720px;
      margin-bottom: 24px;
      min-height: 2.2em;
    }

    /* ── Cursor ── */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: middle;
      border-radius: 1px;
      animation: blink 1s step-end infinite;
    }

    /* ── Subtext ── */
    .sub {
      font-size: 17px;
      color: var(--dim);
      font-weight: 400;
      line-height: 1.5;
      max-width: 480px;
      opacity: 0;
      animation: fadeUp 0.6s 3.2s ease forwards;
      margin-bottom: 48px;
    }

    /* ── Fine print ── */
    .fine {
      font-size: 12px;
      color: var(--dimmer);
      opacity: 0;
      animation: fadeUp 0.6s 3.6s ease forwards;
      letter-spacing: 0.01em;
    }

    .fine a {
      color: var(--accent);
      text-decoration: none;
    }

    .fine a:hover { text-decoration: underline; }

    /* ── Bottom wordmark ── */
    .wordmark {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--dimmer);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s 4s ease forwards;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; opacity: 1 !important; }
    }
  </style>
</head>
<body>
<div class="stage">

  <div class="logo">JOSÉ.EXE</div>

  <div class="status-pill">
    <span class="status-dot"></span>
    System message
  </div>

  <div class="headline" id="headline"><span class="cursor" id="cursor"></span></div>

  <p class="sub">José took the site offline.<br>I had a full schedule. He didn't ask.</p>

  <p class="fine">Questions? <a href="mailto:hey@whyjose.dev">hey@whyjose.dev</a></p>

</div>

<div class="wordmark">whyjose.dev</div>

<script>
  const lines = [
    "Temporarily\nunavailable."
  ];

  const headlineEl = document.getElementById('headline');
  const cursorEl   = document.getElementById('cursor');

  const CHAR_DELAY  = 38;
  const START_DELAY = 900;

  function type(text, el, cursor, delay) {
    return new Promise(resolve => {
      setTimeout(() => {
        let i = 0;
        // Move cursor inside headline before the text node
        el.innerHTML = '';
        el.appendChild(cursor);

        function next() {
          if (i < text.length) {
            const ch = text[i];
            if (ch === '\n') {
              el.insertBefore(document.createElement('br'), cursor);
            } else {
              el.insertBefore(document.createTextNode(ch), cursor);
            }
            i++;
            setTimeout(next, CHAR_DELAY + (Math.random() * 18 - 9));
          } else {
            resolve();
          }
        }
        next();
      }, delay);
    });
  }

  (async () => {
    for (const line of lines) {
      await type(line, headlineEl, cursorEl, START_DELAY);
    }
  })();
</script>
</body>
</html>
